<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <link rel="manifest" href="manifest.json">
    <title>Crew Hub</title>
    <style>
        :root {
            /* iOS Adaptive Colors */
            --primary: #007AFF; 
            --accent: #d71920; 
            --success: #34C759; 
            --warning: #FFCC00; 
            
            /* Light Mode */
            --bg-main: #F2F2F7; 
            --bg-card: #ffffff;
            --text-dark: #000000;
            --text-light: #8E8E93;
            --border: rgba(0, 0, 0, 0.1);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            --header-bg: rgba(242, 242, 247, 0.85);
            --bar-bg: rgba(255, 255, 255, 0.9);
            --input-fill: #ffffff;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-main: #000000; 
                --bg-card: #1C1C1E;
                --text-dark: #FFFFFF;
                --text-light: #8E8E93;
                --border: rgba(255, 255, 255, 0.15);
                --shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
                --header-bg: rgba(28, 28, 30, 0.85);
                --bar-bg: rgba(28, 28, 30, 0.9);
                --input-fill: #2C2C2E;
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-main); /* Crucial: Matches app BG to prevent gaps */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            color: var(--text-dark);
            position: fixed; /* Prevents body scrolling that exposes white gaps */
        }

        .container {
            width: 100%;
            height: 100vh;
            height: -webkit-fill-available; /* Fixed height for iOS standalone */
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: var(--bg-main);
        }

        /* VIEW LOGIC */
        .app-view { display: none; flex-direction: column; height: 100%; overflow: hidden; animation: fadeAppIn 0.3s ease-out; }
        .app-view.visible-app { display: flex; }
        @keyframes fadeAppIn { from { opacity: 0; transform: scale(0.99); } to { opacity: 1; transform: scale(1); } }

        /* DASHBOARD */
        .dashboard-header { padding: calc(var(--safe-top, 0px) + 30px) 25px 15px; }
        .dashboard-header h1 { margin: 0; font-size: 2.2em; font-weight: 800; letter-spacing: -1px; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px 25px; }
        .app-icon { display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer; }
        .app-icon:active { transform: scale(0.92); }
        .icon-bg { 
            width: 100%; aspect-ratio: 1; border-radius: 22%; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 40px; box-shadow: 0 10px 20px rgba(0,0,0,0.15); 
        }
        .icon-bg.medical { background: linear-gradient(135deg, #FF5E5E, #D71920); }
        .icon-bg.cocktail { background: linear-gradient(135deg, #FF9500, #FF3B30); }
        .app-icon span { font-size: 15px; font-weight: 600; margin-top: 5px; }

        /* HEADERS */
        header.app-header {
            background-color: var(--header-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: calc(var(--safe-top, 0px) + 12px) 15px 12px;
            text-align: center; border-bottom: 0.5px solid var(--border);
            z-index: 30;
        }
        header.app-header h1 { margin: 0; font-size: 17px; font-weight: 700; }
        .nav-btn { position: absolute; left: 15px; bottom: 12px; background: none; border: none; color: var(--primary); font-size: 17px; cursor: pointer; display: flex; align-items: center; }

        /* CONTENT SCROLL AREA */
        .content-area {
            flex: 1; overflow-y: auto; 
            /* Reserve space for action bar + bottom safe area */
            padding: 15px 15px calc(var(--safe-bottom, 0px) + 100px); 
            -webkit-overflow-scrolling: touch;
        }

        /* UI BLOCKS */
        .block { display: none; background: var(--bg-card); padding: 20px; border-radius: 16px; box-shadow: var(--shadow); margin-bottom: 15px; border: 0.5px solid var(--border); }
        .block.visible { display: block; }
        h2 { font-size: 22px; margin: 0 0 15px; font-weight: 700; }
        h3 { font-size: 13px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 15px; font-weight: 700; }

        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 12px; border: none; background: var(--input-fill); border-radius: 12px; font-size: 17px; color: var(--text-dark); outline: none; box-shadow: inset 0 0 0 0.5px var(--border); }
        .row { display: flex; gap: 10px; }
        .row > * { flex: 1; min-width: 0; }

        .option-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .option-group button { flex: 1; min-width: 80px; background: var(--input-fill); border: none; padding: 12px; border-radius: 10px; color: var(--text-dark); font-weight: 600; font-size: 14px; }
        .option-group button.selected { background: var(--primary); color: white; }
        .option-group button[value="conscious"].selected { background: var(--success); }
        .option-group button[value="unconscious"].selected { background: var(--accent); }

        .btn-main { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 14px; font-size: 17px; font-weight: 600; cursor: pointer; box-shadow: var(--shadow); }
        .btn-main:active { transform: scale(0.97); }

        /* ACTION BAR (Fixed to bottom, covering safe area) */
        .action-bar {
            display: grid; grid-template-columns: repeat(3, 1fr); align-items: center; 
            position: absolute; bottom: 0; left: 0; width: 100%;
            /* Extends background color through the bottom safe area */
            padding: 12px 10px calc(var(--safe-bottom, 0px) + 12px); 
            background: var(--bar-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid var(--border); z-index: 40;
        }
        .action-bar button { background: none; border: none; color: var(--primary); font-size: 24px; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 0; }
        .action-bar button span { font-size: 10px; font-weight: 600; color: var(--text-light); text-transform: uppercase; }

        /* MIXOLOGY */
        .search-box { padding: 15px 15px 0; }
        .search-box div { display:flex; align-items:center; background:var(--bg-card); border-radius:12px; padding:0 12px; box-shadow:var(--shadow); border: 0.5px solid var(--border); }
        .search-box input { margin-bottom:0; box-shadow:none; background:transparent; border:none; width: 100%; }
        
        .filter-chips { display: flex; gap: 10px; padding: 15px; overflow-x: auto; scrollbar-width: none; }
        .filter-chips::-webkit-scrollbar { display: none; }
        .chip { flex-shrink: 0; padding: 8px 18px; background: var(--bg-card); border-radius: 20px; font-size: 14px; font-weight: 600; box-shadow: var(--shadow); border: 0.5px solid var(--border); }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        .recipe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .recipe-card { background: var(--bg-card); border-radius: 20px; padding: 20px; box-shadow: var(--shadow); text-align: center; cursor: pointer; border: 0.5px solid var(--border); }
        .recipe-card:active { transform: scale(0.95); }
        .recipe-emoji { font-size: 44px; margin-bottom: 8px; }

        /* MODALS */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 100; }
        .modal-box { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 90%; max-width: 380px; max-height: 85vh; background: var(--bg-card); 
            border-radius: 28px; z-index: 101; overflow-y: auto; padding: 25px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 0.5px solid var(--border); 
        }
        .close-btn { position: absolute; top: 15px; right: 15px; border: none; background: var(--bg-main); border-radius: 50%; width: 30px; height: 30px; font-weight: bold; }
        
        .method-step { display: flex; gap: 12px; margin-bottom: 12px; align-items: flex-start; }
        .step-num { width: 22px; height: 22px; background: var(--primary); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 12px; font-weight: bold; flex-shrink: 0; }
        .step-text { font-size: 15px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="container">
        <!-- DASHBOARD -->
        <div id="dashboard-view" class="app-view visible-app">
            <div class="dashboard-header">
                <h1>Crew Hub</h1>
            </div>
            <div class="dashboard-grid">
                <div class="app-icon" onclick="openApp('medical-app')">
                    <div class="icon-bg medical">🏥</div>
                    <span>Medical Log</span>
                </div>
                <div class="app-icon" onclick="openApp('cocktail-app')">
                    <div class="icon-bg cocktail">🍹</div>
                    <span>Mixology</span>
                </div>
            </div>
        </div>

        <!-- MEDICAL APP -->
        <div id="medical-app" class="app-view">
            <header class="app-header">
                <button id="med-home-btn" class="nav-btn" onclick="openApp('dashboard-view')">Home</button>
                <button id="med-back-btn" class="nav-btn" onclick="backToSelection()" style="display:none">Back</button>
                <h1>Medical Log</h1>
            </header>
            <div class="content-area">
                <section id="selection-menu" class="visible">
                    <h2>Passenger Details</h2>
                    <form id="passenger-form">
                        <div class="row">
                            <input type="text" id="seat" placeholder="Seat (e.g., 2A)">
                            <input type="number" id="age" placeholder="Age" inputmode="numeric">
                        </div>
                        <select id="gender">
                            <option value="">Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </form>
                    <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 10px;">
                        <button class="btn-main" style="background:var(--bg-card); color:var(--text-dark); text-align:left; display:flex; justify-content:space-between; border:0.5px solid var(--border);" onclick="startAssessment('primary-assessment')">Primary Assessment <span>›</span></button>
                        <button class="btn-main" style="background:var(--bg-card); color:var(--text-dark); text-align:left; display:flex; justify-content:space-between; border:0.5px solid var(--border);" onclick="startAssessment('secondary-assessment')">Secondary (SAMPLE) <span>›</span></button>
                        <button class="btn-main" style="background:var(--bg-card); color:var(--text-dark); text-align:left; display:flex; justify-content:space-between; border:0.5px solid var(--border);" onclick="startAssessment('vital-signs')">Vital Signs <span>›</span></button>
                    </div>
                </section>

                <section id="primary-assessment" class="block">
                    <h2>Primary Assessment</h2>
                    <h3>Consciousness</h3>
                    <div class="option-group">
                        <button type="button" onclick="sel('loc','conscious', this)" name="loc" value="conscious">Conscious</button>
                        <button type="button" onclick="sel('loc','semi-conscious', this)" name="loc" value="semi-conscious">Semi</button>
                        <button type="button" onclick="sel('loc','unconscious', this)" name="loc" value="unconscious">Unconscious</button>
                    </div>
                    <h3>Airway & Breathing</h3>
                    <div class="option-group">
                        <button type="button" onclick="sel('airway','normal', this)" name="airway">Normal</button>
                        <button type="button" onclick="sel('airway','obstructed', this)" name="airway">Obstructed</button>
                    </div>
                    <button class="btn-main" onclick="backToSelection()">Save & Return</button>
                </section>

                <section id="secondary-assessment" class="block">
                    <h2>Secondary (SAMPLE)</h2>
                    <input type="text" id="signs" placeholder="Signs & Symptoms (S)">
                    <input type="text" id="allergies" placeholder="Allergies (A)">
                    <input type="text" id="meds" placeholder="Medications (M)">
                    <textarea id="past" placeholder="Past Medical History (P)" rows="3" style="font-family: inherit;"></textarea>
                    <button class="btn-main" onclick="backToSelection()">Save & Return</button>
                </section>

                <section id="vital-signs" class="block">
                    <h2>Vital Signs</h2>
                    <div class="row">
                        <input type="number" id="pulse" placeholder="Pulse (BPM)" inputmode="numeric">
                        <input type="number" id="spo2" placeholder="O2 Sat (%)" inputmode="numeric">
                    </div>
                    <input type="text" id="bp" placeholder="Blood Pressure (e.g. 120/80)">
                    <h3 style="margin-top:10px;">Pain (0-10): <span id="pain-val">0</span></h3>
                    <input type="range" id="pain" min="0" max="10" value="0" style="width:100%; margin-bottom:20px;" oninput="document.getElementById('pain-val').innerText=this.value">
                    <button class="btn-main" onclick="backToSelection()">Save & Return</button>
                </section>
            </div>
            <div class="action-bar">
                <button onclick="downloadLog()">📥<span>Save</span></button>
                <button onclick="showMedSummary()">📋<span>Summary</span></button>
                <button onclick="clearAllData()">🗑️<span>Clear</span></button>
            </div>
        </div>

        <!-- MIXOLOGY APP -->
        <div id="cocktail-app" class="app-view">
            <header class="app-header">
                <button class="nav-btn" onclick="openApp('dashboard-view')">Home</button>
                <h1>Mixology Guide</h1>
            </header>
            <div class="search-box">
                <div>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3; margin-right:8px;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="search" placeholder="Search drinks..." onkeyup="filterDrinks()">
                </div>
            </div>
            <div class="filter-chips">
                <div class="chip active" onclick="setFilter('All', this)">All</div>
                <div class="chip" onclick="setFilter('Cocktail', this)">Cocktails</div>
                <div class="chip" onclick="setFilter('Mocktail', this)">Mocktails</div>
            </div>
            <div class="content-area">
                <div class="recipe-grid" id="recipe-grid"></div>
            </div>
        </div>

        <!-- OVERLAYS -->
        <div id="overlay" class="modal-overlay" onclick="closeModal()"></div>
        <div id="modal" class="modal-box">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        const drinks = [
            { id: 1, name: "Bloody Mary", type: "Cocktail", emoji: "🍅", glass: "Tumbler / Crystal Cut", ice: "3-4 Cubes", ingredients: ["Double measure Vodka", "Big Tom spiced tomato juice", "OR Regular tomato juice", "Worcestershire sauce", "Tabasco", "Salt and Pepper"], garnish: "Lemon slice and Celery stick", steps: ["Place ice in glass.","Pour double measure of vodka.","Top with tomato juice.","Add condiments to taste.","Garnish and serve."] },
            { id: 2, name: "Cosmopolitan", type: "Cocktail", emoji: "🍸", glass: "Cocktail Glass", ice: "Shaker Ice", ingredients: ["1.5 Vodka", "0.5 Cointreau", "Single Cranberry", "0.5 Lime"], garnish: "None", steps: ["Fill half shaker with ice.","Pour vodka, Cointreau, cranberry and lime.","Shake for 10 seconds.","Strain into glass."] },
            { id: 3, name: "Classic Martini", type: "Cocktail", emoji: "🍸", glass: "Cocktail Glass", ice: "Shaker Ice", ingredients: ["Double Gin", "0.5 Martini Extra Dry"], garnish: "Olive skewered", steps: ["Fill half shaker with ice.","Pour gin and martini.","Stir or shake for 10 seconds.","Strain and drop olive in."] },
            { id: 4, name: "Kir Royale", type: "Cocktail", emoji: "🥂", glass: "Champagne Flute", ice: "No Ice", ingredients: ["1/3 Crème de Cassis", "Champagne"], garnish: "None", steps: ["Pour Cassis into glass.","Top up slowly with champagne."] },
            { id: 5, name: "Manhattan", type: "Cocktail", emoji: "🥃", glass: "Tumbler", ice: "3-4 Cubes", ingredients: ["Double Bourbon", "Bitters", "Martini Rosso/Dry"], garnish: "Cherry or Lemon", steps: ["Fill shaker with ice.","Add ingredients. Stir for 10 seconds.","Strain over fresh ice."] },
            { id: 6, name: "Breakfast Martini", type: "Cocktail", emoji: "🍊", glass: "Cocktail Glass", ice: "Shaker Ice", ingredients: ["Dry Gin", "Cointreau", "Marmalade", "Lime", "Orange juice"], garnish: "None", steps: ["Fill shaker with ice.","Add marmalade and liquids.","Shake for 10 seconds.","Strain into glass."] },
            { id: 7, name: "Espresso Martini", type: "Cocktail", emoji: "☕", glass: "Cocktail Glass", ice: "Shaker Ice", ingredients: ["Vodka", "Tia Maria", "Espresso"], garnish: "3 coffee beans", steps: ["Fill shaker with ice.","Pour ingredients. Shake vigorously for foam.","Strain."] },
            { id: 8, name: "Mojito", type: "Cocktail", emoji: "🌿", glass: "Tumbler", ice: "3-4 Cubes", ingredients: ["Double White Rum", "Lime", "Mint", "Sugar syrup", "Soda"], garnish: "Mint sprig", steps: ["Muddle lime, mint, and syrup.","Add rum and ice.","Top with soda and stir."] },
            { id: 9, name: "Old Fashioned", type: "Cocktail", emoji: "🥃", glass: "Tumbler", ice: "3-4 Cubes", ingredients: ["Double Bourbon", "Angostura bitters", "Sugar syrup"], garnish: "Cherry and Orange slice", steps: ["Add syrup, bitters, and whiskey.","Add ice. Stir for 10 seconds.","Garnish inside glass."] },
            { id: 10, name: "Champagne Cocktail", type: "Cocktail", emoji: "🥂", glass: "Champagne Flute", ice: "No Ice", ingredients: ["Champagne", "Bitters", "Sugar", "Cognac"], garnish: "Cherry and Orange slice", steps: ["Add sugar, bitters, and cognac.","Top up with champagne.","Stir gently."] },
            { id: 11, name: "Negroni", type: "Cocktail", emoji: "🥃", glass: "Tumbler", ice: "3-4 Cubes", ingredients: ["Dry Gin", "Campari", "Martini Rosso"], garnish: "Orange slice", steps: ["Stir in shaker with ice for 10 seconds.","Strain over fresh ice."] },
            { id: 12, name: "Aperol Spritz", type: "Cocktail", emoji: "🍹", glass: "Wine Glass", ice: "3-4 Cubes", ingredients: ["Aperol Spritz Pre-mix"], garnish: "Orange slice", steps: ["Place ice and orange in glass.","Pour bottle into glass."] },
            { id: 13, name: "Vesper", type: "Cocktail", emoji: "🍸", glass: "Cocktail Glass", ice: "Shaker Ice", ingredients: ["Double Gin", "Vodka", "Martini Dry"], garnish: "Lemon slice", steps: ["Stir in shaker for 20 seconds.","Strain into glass."] },
            { id: 14, name: "Rum Revolver", type: "Cocktail", emoji: "🥃", glass: "Tumbler", ice: "Shaker Ice", ingredients: ["Double White Rum", "Tia Maria", "Bitters"], garnish: "Orange slice", steps: ["Stir for 20 seconds.","Strain into glass with ice."] },
            { id: 15, name: "Orange Fizz", type: "Mocktail", emoji: "🍊", glass: "Champagne Flute", ice: "No Ice", ingredients: ["Orange juice", "Ginger ale"], garnish: "None", steps: ["Half fill with juice. Top with ginger ale."] },
            { id: 16, name: "Apple Spritzer", type: "Mocktail", emoji: "🍎", glass: "Champagne Flute", ice: "No Ice", ingredients: ["Apple juice", "Soda water"], garnish: "Mint sprig", steps: ["Half fill with juice. Top with soda."] },
            { id: 17, name: "Virgin Cucumber Gimlet", type: "Mocktail", emoji: "🥒", glass: "Tumbler", ice: "3-4 Cubes", ingredients: ["Tanqueray 0.0", "Syrup", "Cucumber", "Lime", "Soda"], garnish: "Mint sprig", steps: ["Muddle cucumber and lime.","Add 0.0 and ice. Top with soda."] },
            { id: 18, name: "Rose Iced Tea", type: "Mocktail", emoji: "🌹", glass: "Tumbler", ice: "3-4 Cubes", ingredients: ["Rose Iced Tea Pre-mix"], garnish: "Basil and Flower", steps: ["Shake bottle. Pour over ice."] },
            { id: 19, name: "Tropical Twist", type: "Mocktail", emoji: "🍍", glass: "Tumbler", ice: "3-4 Cubes", ingredients: ["Tropical Twist Pre-mix"], garnish: "Basil and Apple", steps: ["Shake bottle. Pour over ice."] },
            { id: 20, name: "Citrus Twist", type: "Mocktail", emoji: "🍋", glass: "Tumbler", ice: "3-4 Cubes", ingredients: ["Citrus Twist Pre-mix"], garnish: "Mint and Lime", steps: ["Shake bottle. Pour over ice."] },
            { id: 21, name: "Raspberry Spice", type: "Mocktail", emoji: "🍓", glass: "Tumbler", ice: "3-4 Cubes", ingredients: ["Raspberry Spice Pre-mix"], garnish: "Flower and Orange", steps: ["Shake bottle. Pour over ice."] },
            { id: 22, name: "Virgin Mary", type: "Mocktail", emoji: "🍅", glass: "Tumbler", ice: "3-4 Cubes", ingredients: ["Big Tom juice", "Condiments"], garnish: "Lemon and Celery", steps: ["Place ice. Top with juice and condiments."] },
            { id: 23, name: "Virgin Mojito", type: "Mocktail", emoji: "🌿", glass: "Tumbler", ice: "3-4 Cubes", ingredients: ["Mint", "Lime", "Syrup", "Soda"], garnish: "Mint sprig", steps: ["Muddle mint, lime, and syrup.","Add ice. Top with soda."] },
            { id: 24, name: "Mint Lemonade", type: "Mocktail", emoji: "🍋", glass: "Tumbler", ice: "3-4 Cubes", ingredients: ["Mint Lemonade Pre-mix"], garnish: "Mint sprig", steps: ["Shake bottle. Pour over ice."] }
        ];

        let currentMed = { loc: '', airway: '' };

        function openApp(id) {
            document.querySelectorAll('.app-view').forEach(v => v.classList.remove('visible-app'));
            document.getElementById(id).classList.add('visible-app');
            if(id === 'cocktail-app') filterDrinks();
        }

        function startAssessment(id) {
            document.querySelectorAll('#medical-app section').forEach(s => s.classList.remove('visible'));
            document.getElementById(id).classList.add('visible');
            document.getElementById('med-home-btn').style.display = 'none';
            document.getElementById('med-back-btn').style.display = 'flex';
        }

        function backToSelection() {
            document.querySelectorAll('#medical-app section').forEach(s => s.classList.remove('visible'));
            document.getElementById('selection-menu').classList.add('visible');
            document.getElementById('med-home-btn').style.display = 'flex';
            document.getElementById('med-back-btn').style.display = 'none';
        }

        function sel(cat, val, el) {
            currentMed[cat] = val;
            const group = el.parentElement;
            group.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
        }

        function showMedSummary() {
            const html = `<h2>Log</h2><p>Seat: ${document.getElementById('seat').value || '?'}</p><p>LOC: ${currentMed.loc}</p><button class="btn-main" onclick="closeModal()">Dismiss</button>`;
            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
        }

        function clearAllData() { if(confirm("Clear?")) location.reload(); }
        function downloadLog() { alert("Report Ready."); }

        let filterType = 'All';
        function setFilter(t, el) {
            filterType = t;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            filterDrinks();
        }

        function filterDrinks() {
            const q = document.getElementById('search').value.toLowerCase();
            const grid = document.getElementById('recipe-grid');
            grid.innerHTML = '';
            drinks.filter(d => (filterType === 'All' || d.type === filterType) && d.name.toLowerCase().includes(q)).forEach(d => {
                grid.innerHTML += `<div class="recipe-card" onclick="openRecipe(${d.id})"><div class="recipe-emoji">${d.emoji}</div><div style="font-weight:700;">${d.name}</div></div>`;
            });
        }

        function openRecipe(id) {
            const d = drinks.find(x => x.id === id);
            const html = `
                <div style="text-align:center;">
                    <div style="font-size:50px;">${d.emoji}</div>
                    <h2>${d.name}</h2>
                </div>
                <p><b>Glass:</b> ${d.glass}</p>
                <p><b>Ice:</b> ${d.ice}</p>
                <p><b>Ingredients:</b><br>${d.ingredients.join(', ')}</p>
                <h3>Method</h3>
                ${d.steps.map((s, i) => `<div class="method-step"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></div>`).join('')}
                <p><b>Garnish:</b> ${d.garnish}</p>
                <button class="btn-main" onclick="closeModal()">Close</button>
            `;
            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('modal').style.display = 'none';
        }

        if ('serviceWorker' in navigator && window.location.protocol === 'https:') {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
