<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Crew Hub</title>
    <style>
        :root {
            /* Adaptive Colors - Premium Palette */
            --primary: #007AFF; 
            --primary-rgb: 0, 122, 255;
            --accent: #FF3B30; 
            --success: #34C759; 
            --warning: #FFCC00; 
            
            /* Light Mode */
            --bg-main: #F2F2F7; 
            --bg-card: #FFFFFF;
            --text-dark: #000000;
            --text-light: #8E8E93;
            --border: rgba(0, 0, 0, 0.08);
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            --header-bg: rgba(242, 242, 247, 0.8);
            --bar-bg: rgba(255, 255, 255, 0.85);
            --input-fill: rgba(0, 0, 0, 0.05);
            --sheet-bg: #FFFFFF;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-main: #000000; 
                --bg-card: #1C1C1E;
                --text-dark: #FFFFFF;
                --text-light: #98989D;
                --border: rgba(255, 255, 255, 0.1);
                --shadow: 0 12px 32px rgba(0, 0, 0, 0.6);
                --header-bg: rgba(0, 0, 0, 0.8);
                --bar-bg: rgba(28, 28, 30, 0.85);
                --input-fill: rgba(255, 255, 255, 0.1);
                --sheet-bg: #1C1C1E;
            }
        }

        /* RESET & BASE */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            height: 100%; width: 100%; margin: 0; padding: 0;
            overflow: hidden; background-color: var(--bg-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
            color: var(--text-dark);
        }

        body { display: flex; justify-content: center; }

        .container {
            max-width: 430px; width: 100%; height: 100dvh;
            background: var(--bg-main); display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }

        /* VIEW TRANSITIONS */
        .app-view { display: none; flex-direction: column; height: 100%; overflow: hidden; }
        .app-view.visible-app { display: flex; animation: viewSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes viewSlideIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* DASHBOARD */
        .dashboard-header { padding: calc(var(--safe-top, 0px) + 30px) 25px 15px; }
        .dashboard-header h1 { margin: 0; font-size: 34px; font-weight: 800; letter-spacing: -1px; }
        
        .dashboard-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;
            padding: 20px 25px; align-content: start;
        }
        
        .app-icon {
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            cursor: pointer; transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .app-icon:active { transform: scale(0.9); }
        .app-icon .icon-bg {
            width: 100%; aspect-ratio: 1; border-radius: 22%;
            display: flex; justify-content: center; align-items: center; font-size: 44px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .icon-bg.medical { background: linear-gradient(135deg, #FF5E5E, #D71920); }
        .icon-bg.cocktail { background: linear-gradient(135deg, #FF9500, #FF3B30); }
        .app-icon span { font-size: 15px; font-weight: 600; color: var(--text-dark); }

        /* REFINED HEADERS */
        header.app-header {
            background: var(--header-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: calc(var(--safe-top, 0px) + 10px) 20px 10px;
            display: grid; grid-template-columns: 80px 1fr 80px; align-items: center;
            border-bottom: 0.5px solid var(--border); z-index: 50;
        }
        header.app-header h1 { margin: 0; font-size: 17px; font-weight: 700; text-align: center; white-space: nowrap; }

        .nav-btn {
            background: none; border: none; color: var(--primary);
            font-size: 17px; font-weight: 400; display: flex; align-items: center; padding: 0;
        }
        .nav-btn:active { opacity: 0.5; }

        .content-area {
            flex: 1; overflow-y: auto; padding: 15px 15px 120px;
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }

        /* SHARED FORMS & BLOCKS */
        .block {
            display: none; background: var(--bg-card); padding: 20px; 
            border-radius: 20px; box-shadow: var(--shadow); margin-bottom: 15px;
            animation: blockFadeIn 0.3s ease-out; border: 0.5px solid var(--border);
        }
        .block.visible { display: block; }
        @keyframes blockFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-size: 22px; font-weight: 700; margin: 0 0 15px; letter-spacing: -0.5px; }
        h3 { font-size: 16px; font-weight: 600; color: var(--text-light); text-transform: uppercase; margin-bottom: 15px; }

        input, select, textarea {
            width: 100%; padding: 14px; margin-bottom: 12px; border: none;
            background: var(--input-fill); border-radius: 12px; font-size: 17px;
            color: var(--text-dark); outline: none;
        }
        input::placeholder { color: var(--text-light); opacity: 0.7; }

        .row { display: flex; gap: 12px; }
        .row > * { flex: 1; min-width: 0; }

        /* BUTTONS */
        .btn-main {
            width: 100%; padding: 16px; background: var(--primary); color: white;
            border: none; border-radius: 14px; font-size: 17px; font-weight: 600;
            cursor: pointer; transition: transform 0.1s, opacity 0.2s;
        }
        .btn-main:active { transform: scale(0.97); opacity: 0.9; }

        .option-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .option-group button {
            flex: 1 1 calc(33.33% - 8px); background: var(--input-fill); color: var(--text-dark);
            padding: 12px 5px; font-size: 14px; font-weight: 500; border-radius: 10px; border: none;
            transition: all 0.2s;
        }
        .option-group button.selected { background: var(--primary); color: white; font-weight: 600; }
        
        /* SELECTION GRID */
        .selection-grid { display: grid; gap: 12px; margin-top: 10px; }
        .selection-grid button {
            background: var(--bg-card); color: var(--text-dark); text-align: left;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--shadow); padding: 18px; border: 0.5px solid var(--border); border-radius: 16px;
            font-size: 17px; font-weight: 600; cursor: pointer;
        }
        .selection-grid button::after { content: "􀆊"; font-family: system-ui; color: var(--text-light); opacity: 0.5; }

        /* COCKTAIL SEARCH & CHIPS */
        .sticky-search {
            position: sticky; top: 0; z-index: 40; background: var(--header-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 10px 15px; border-bottom: 0.5px solid var(--border);
        }
        .search-bar {
            display: flex; align-items: center; background: var(--input-fill);
            border-radius: 10px; padding: 8px 12px; gap: 8px;
        }
        .search-bar input { border: none; background: none; width: 100%; color: var(--text-dark); font-size: 17px; outline: none; }
        
        .filter-container { padding: 15px 0 5px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
        .chip {
            padding: 8px 16px; background: var(--bg-card); border-radius: 20px;
            font-size: 14px; font-weight: 600; white-space: nowrap; color: var(--text-dark);
            box-shadow: var(--shadow); transition: all 0.2s; border: 0.5px solid var(--border);
        }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* ACTION BAR */
        .action-bar {
            position: absolute; bottom: 0; width: 100%;
            background: var(--bar-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 15px 15px calc(var(--safe-bottom, 0px) + 15px);
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            border-top: 0.5px solid var(--border); z-index: 50;
        }
        .action-bar button {
            background: none; border: none; display: flex; flex-direction: column; 
            align-items: center; gap: 4px; color: var(--primary);
        }
        .action-bar button span { font-size: 10px; font-weight: 500; color: var(--text-light); text-transform: uppercase; }

        /* IOS STYLE BOTTOM SHEET */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 100; opacity: 0; transition: opacity 0.3s;
        }
        .bottom-sheet {
            display: none; position: fixed; bottom: -100%; left: 0; width: 100%; height: 85vh;
            background: var(--sheet-bg); border-radius: 30px 30px 0 0; z-index: 101;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1); overflow-y: auto;
            transition: bottom 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .bottom-sheet.open { bottom: 0; display: block; }
        .sheet-handle {
            width: 40px; height: 5px; background: var(--text-light); opacity: 0.3;
            border-radius: 3px; margin: 12px auto;
        }

        /* RECIPE GRID ANIMATION */
        .recipe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .recipe-card {
            background: var(--bg-card); border-radius: 20px; padding: 18px;
            box-shadow: var(--shadow); border: 0.5px solid var(--border);
            display: flex; flex-direction: column; align-items: center; text-align: center;
            opacity: 0; transform: translateY(20px); animation: staggerIn 0.5s ease forwards;
        }
        @keyframes staggerIn { to { opacity: 1; transform: translateY(0); } }

        /* SUMMARY LIST */
        ul.summary-list { list-style: none; padding: 0; margin: 0; }
        ul.summary-list li { padding: 12px 0; border-bottom: 0.5px solid var(--border); font-size: 15px; }
        ul.summary-list li strong { display: block; font-size: 12px; color: var(--text-light); text-transform: uppercase; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="container">
        <!-- DASHBOARD -->
        <div id="dashboard-view" class="app-view visible-app">
            <div class="dashboard-header">
                <h1>Crew Hub</h1>
            </div>
            <div class="dashboard-grid">
                <div class="app-icon" onclick="openApp('medical-app')">
                    <div class="icon-bg medical">🏥</div>
                    <span>Medical</span>
                </div>
                <div class="app-icon" onclick="openApp('cocktail-app')">
                    <div class="icon-bg cocktail">🍹</div>
                    <span>Mixology</span>
                </div>
            </div>
        </div>

        <!-- MEDICAL APP -->
        <div id="medical-app" class="app-view">
            <header class="app-header">
                <button id="med-home-btn" class="nav-btn" onclick="openApp('dashboard-view')">Home</button>
                <button id="med-back-btn" class="nav-btn" onclick="backToSelection()" style="display:none">Back</button>
                <h1>Medical</h1>
                <div></div>
            </header>

            <div class="content-area">
                <!-- SELECTION MENU -->
                <section id="selection-menu" class="visible">
                    <h2>Passenger Details</h2>
                    <form id="passenger-form" onchange="updateAdditionalInfo()">
                        <div class="row">
                            <input type="text" name="seatNumber" placeholder="Seat (e.g., 1A)">
                            <input type="number" name="age" placeholder="Age" inputmode="numeric">
                        </div>
                        <div class="row">
                            <select name="gender">
                                <option value="">Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                            <select name="accompanied">
                                <option value="">Accompanied?</option>
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                    </form>
                    <div class="selection-grid">
                        <button onclick="startAssessment('primary-assessment')">Primary Assessment</button>
                        <button onclick="startAssessment('secondary-assessment')">Secondary Assessment</button>
                        <button onclick="startAssessment('vital-signs')">Vital Signs</button>
                    </div>
                </section>

                <!-- PRIMARY ASSESSMENT -->
                <section id="primary-assessment" class="block">
                    <h2>Primary Assessment</h2>
                    <h3>1. Consciousness</h3>
                    <div class="option-group">
                        <button type="button" name="loc" value="conscious" onclick="selectSingleOption('loc', 'conscious')">Conscious</button>
                        <button type="button" name="loc" value="semi-conscious" onclick="selectSingleOption('loc', 'semi-conscious')">Semi</button>
                        <button type="button" name="loc" value="unconscious" onclick="selectSingleOption('loc', 'unconscious')">Unconscious</button>
                    </div>
                    <h3>2. Airway & Breathing</h3>
                    <div class="option-group">
                        <button type="button" name="airway" value="normal" onclick="selectSingleOption('airway', 'normal')">Normal</button>
                        <button type="button" name="airway" value="obstructed" onclick="selectSingleOption('airway', 'obstructed')">Obstructed</button>
                    </div>
                    <div class="option-group">
                        <button type="button" name="breathing" value="normal" onclick="selectSingleOption('breathing', 'normal')">Normal</button>
                        <button type="button" name="breathing" value="not_breathing" onclick="selectSingleOption('breathing', 'not_breathing')">None</button>
                    </div>
                    <button class="btn-main" onclick="submitAssessment('primary')">Save & Return</button>
                </section>

                <!-- SECONDARY ASSESSMENT -->
                <section id="secondary-assessment" class="block">
                    <h2>Secondary Assessment</h2>
                    <form id="sample-form">
                        <input type="text" name="signs" placeholder="Signs & Symptoms (S)">
                        <input type="text" name="allergies" placeholder="Allergies (A)">
                        <input type="text" name="medications" placeholder="Medications (M)">
                        <input type="text" name="pastHistory" placeholder="Past Medical History (P)">
                        <button type="button" class="btn-main" onclick="submitAssessment('secondary')">Save SAMPLE</button>
                    </form>
                </section>

                <!-- VITAL SIGNS -->
                <section id="vital-signs" class="block">
                    <h2>Vital Signs</h2>
                    <form id="vital-form">
                        <input type="number" name="pulse" placeholder="Pulse (BPM)" inputmode="numeric">
                        <input type="number" name="spo2" placeholder="O2 Saturation (%)" inputmode="numeric">
                        <input type="text" name="bloodPressure" placeholder="Blood Pressure (e.g. 120/80)">
                        <button type="button" class="btn-main" onclick="submitAssessment('vitals')">Save Vitals</button>
                    </form>
                </section>
            </div>

            <div class="action-bar">
                <button onclick="downloadNotes()">📥<span>Save</span></button>
                <button onclick="showMedicalSummary()">📋<span>Summary</span></button>
                <button onclick="clearAllData()">🗑️<span>Clear</span></button>
            </div>
        </div>

        <!-- COCKTAIL APP -->
        <div id="cocktail-app" class="app-view">
            <header class="app-header">
                <button class="nav-btn" onclick="openApp('dashboard-view')">Home</button>
                <h1>Mixology</h1>
                <div></div>
            </header>
            <div class="sticky-search">
                <div class="search-bar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="opacity:0.4"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="search-input" placeholder="Search drinks..." onkeyup="filterRecipes()">
                </div>
                <div class="filter-container">
                    <div class="chip active" onclick="setFilter('All', this)">All</div>
                    <div class="chip" onclick="setFilter('Cocktail', this)">Cocktails</div>
                    <div class="chip" onclick="setFilter('Mocktail', this)">Mocktails</div>
                </div>
            </div>
            <div class="content-area">
                <div class="recipe-grid" id="recipe-grid"></div>
            </div>
        </div>

        <!-- BOTTOM SHEET -->
        <div id="modal-overlay" class="modal-overlay" onclick="closeRecipe(); closeSummary()"></div>
        <div id="recipe-sheet" class="bottom-sheet">
            <div class="sheet-handle"></div>
            <div id="sheet-content"></div>
        </div>
    </div>

    <script>
        // CORE STATE
        let medData = {
            passenger: {},
            primary: { loc: '', airway: '', breathing: '' },
            secondary: {},
            vitals: {}
        };

        const drinks = [
            { id: 1, name: "Bloody Mary", type: "Cocktail", emoji: "🍅", glass: "Tumbler/Crystal", ice: "3-4 Cubes", history: "Invented in Harry's New York Bar, Paris (1920s). Named after Mary Tudor, known for her bloody reign.", ingredients: ["Double measure Vodka", "Big Tom spiced tomato juice", "Worcestershire sauce", "Tabasco sauce", "Salt & Pepper", "Lemon slice"], steps: "Place ice in tumbler. Pour vodka. Top with tomato juice. Add condiments to customer's taste. Stir well.", garnish: "Lemon slice and celery stick." },
            { id: 2, name: "Cosmopolitan", type: "Cocktail", emoji: "🍸", glass: "Cocktail Glass", ice: "Shaken", history: "Disputed origin, likely 1975 Minneapolis. Gained fame after being called 'Cosmopolitan' by its first taster.", ingredients: ["1.5 single measures Vodka", "0.5 measure Cointreau", "Single measure Cranberry juice", "0.5 measure Lime juice"], steps: "Fill half shaker with ice. Pour ingredients. Shake for 10 seconds and strain.", garnish: "None." },
            { id: 3, name: "Classic Martini", type: "Cocktail", emoji: "🍸", glass: "Cocktail Glass", ice: "Chilled", history: "Likely named after Martini & Rossi vermouth (1860s) or the town of Martinez, CA.", ingredients: ["Double measure Dry Gin", "0.5 measure Martini Extra Dry", "Olive skewer"], steps: "Fill half shaker with ice. Pour gin and vermouth. Stir or shake (per customer) for 10 seconds. Strain.", garnish: "Olive skewered on a stick." },
            { id: 4, name: "Kir Royale", type: "Cocktail", emoji: "🥂", glass: "Champagne Flute", ice: "No Ice", history: "Named after Canon Félix Kir, Mayor of Dijon. Added champagne for special occasions.", ingredients: ["1/3 measure Crème de Cassis", "Champagne"], steps: "Pour Crème de Cassis first. Top up slowly with champagne. Gently stir if needed.", garnish: "None." },
            { id: 5, name: "Manhattan", type: "Cocktail", emoji: "🥃", glass: "Tumbler/Crystal", ice: "3-4 Cubes", history: "Created in the 1880s at the Manhattan Club for Lady Randolph Churchill (Winston's mother).", ingredients: ["Double measure Bourbon", "2 dashes Angostura bitters", "0.5 measure Martini Rosso/Extra Dry"], steps: "Fill shaker with ice. Add bourbon, bitters, and vermouth. Stir for 10 seconds. Strain over ice.", garnish: "Maraschino cherry (Sweet) or Lemon (Dry)." },
            { id: 6, name: "Breakfast Martini", type: "Cocktail", emoji: "🍊", glass: "Cocktail Glass", ice: "Shaken", history: "Modern classic by Salvatore Calabrese (2000). Based on the 1920s Marmalade Cocktail.", ingredients: ["Single measure Dry Gin", "0.5 measure Cointreau", "1 tsp Orange marmalade", "Lime juice", "Fresh Orange juice"], steps: "Fill shaker with ice. Add marmalade and liquids. Shake for 10 seconds. Strain.", garnish: "None." },
            { id: 7, name: "Espresso Martini", type: "Cocktail", emoji: "☕", glass: "Cocktail Glass", ice: "Shaken", history: "Invented by Dick Bradsell (1980s) when a model asked for something to 'wake her up'.", ingredients: ["Single measure Vodka", "Single measure Tia Maria", "Single measure Espresso"], steps: "Fill shaker with ice. Pour ingredients. Vigorously shake for 10 seconds for foam. Strain.", garnish: "Three coffee beans in center." },
            { id: 8, name: "Mojito", type: "Cocktail", emoji: "🌿", glass: "Tumbler/Crystal", ice: "3-4 Cubes", history: "Cuban origins (16th century). Sir Francis Drake's crew used lime and mint to fight scurvy.", ingredients: ["Double measure White Rum", "4 Lime wedges", "10 Mint leaves", "2 sachets Sugar syrup", "Soda"], steps: "Add syrup, lime, and mint. Muddle well. Add rum and ice. Top with soda.", garnish: "Fresh mint sprig." },
            { id: 9, name: "Old Fashioned", type: "Cocktail", emoji: "🥃", glass: "Tumbler/Crystal", ice: "3-4 Cubes", history: "Official cocktail of Louisville, KY. Defined simply as spirits, bitters, water, and sugar.", ingredients: ["Double measure Bourbon", "2 dashes Angostura bitters", "1 sachet Sugar syrup"], steps: "Add syrup and bitters. Pour bourbon. Add ice. Stir for 10 seconds.", garnish: "Maraschino cherry and orange slice." },
            { id: 10, name: "Champagne Cocktail", type: "Cocktail", emoji: "🥂", glass: "Champagne Flute", ice: "No Ice", history: "Featured in Casablanca. Popularized at the turn of the 20th century.", ingredients: ["Champagne", "2 dashes Angostura bitters", "1 sachet Sugar", "0.5 measure Cognac"], steps: "Add sugar to flute. Add bitters and cognac. Top up slowly with champagne. Stir gently.", garnish: "Maraschino cherry and orange slice." },
            { id: 11, name: "Negroni", type: "Cocktail", emoji: "🥃", glass: "Tumbler/Crystal", ice: "3-4 Cubes", history: "Florence, 1919. Count Negroni asked to make his Americano stronger by swapping soda for gin.", ingredients: ["Single measure Dry Gin", "Single measure Campari", "Single measure Martini Rosso"], steps: "Fill shaker with ice. Pour ingredients. Stir for 10 seconds. Strain over fresh ice.", garnish: "Orange slice." },
            { id: 12, name: "Aperol Spritz", type: "Cocktail", emoji: "🍹", glass: "Wine Glass", ice: "3-4 Cubes", history: "Venetian favorite. Inspired by 19th-century Austrian spritzers.", ingredients: ["Ready-made Aperol Spritz bottle", "Ice"], steps: "Place ice in wine glass. Pour entire bottle. Garnish.", garnish: "Orange slice." },
            { id: 13, name: "Vesper", type: "Cocktail", emoji: "🍸", glass: "Cocktail Glass", ice: "Stirred", history: "Created by Ian Fleming in the 1953 Bond novel Casino Royale. Named after Vesper Lynd.", ingredients: ["Double measure Gin", "Single measure Vodka", "0.5 measure Martini Extra Dry"], steps: "Fill shaker with ice. Pour spirits. Stir for 20 seconds. Strain into glass.", garnish: "Fresh lemon slice." },
            { id: 14, name: "Rum Revolver", type: "Cocktail", emoji: "🥃", glass: "Tumbler/Crystal", ice: "Stirred", history: "Modern twist on the 2000s Revolver, swapping bourbon for aged rum.", ingredients: ["Double measure Aged Rum", "0.5 measure Tia Maria", "3 dashes Angostura bitters"], steps: "Fill shaker with ice. Pour ingredients. Stir for 20 seconds. Strain into glass with ice.", garnish: "Orange slice inside glass." },
            { id: 15, name: "Orange Fizz", type: "Mocktail", emoji: "🍊", glass: "Champagne Flute", ice: "No Ice", history: "Inspired by the 1904 Canadian pale dry ginger ale created by chemist John McLaughlin.", ingredients: ["Half Fresh Orange juice", "Top with Ginger Ale"], steps: "Half fill flute with orange juice. Top up with ginger ale slowly.", garnish: "None." },

        ];

        // APP NAVIGATION
        function openApp(id) {
            document.querySelectorAll('.app-view').forEach(v => v.classList.remove('visible-app'));
            document.getElementById(id).classList.add('visible-app');
            if(id === 'cocktail-app') filterRecipes();
            if(id === 'medical-app') backToSelection();
        }

        // MEDICAL LOGIC
        function backToSelection() {
            document.querySelectorAll('#medical-app section').forEach(s => s.classList.remove('visible'));
            document.getElementById('selection-menu').classList.add('visible');
            document.getElementById('med-home-btn').style.display = 'block';
            document.getElementById('med-back-btn').style.display = 'none';
        }

        function startAssessment(id) {
            document.querySelectorAll('#medical-app section').forEach(s => s.classList.remove('visible'));
            document.getElementById(id).classList.add('visible');
            document.getElementById('med-home-btn').style.display = 'none';
            document.getElementById('med-back-btn').style.display = 'block';
        }

        function updateAdditionalInfo() {
            const formData = new FormData(document.getElementById('passenger-form'));
            for(let [k,v] of formData) medData.passenger[k] = v;
        }

        function selectSingleOption(cat, val) {
            medData.primary[cat] = val;
            const buttons = document.querySelectorAll(`button[name="${cat}"]`);
            buttons.forEach(b => b.classList.remove('selected'));
            event.target.classList.add('selected');
        }

        function submitAssessment(type) {
            if(type === 'secondary') {
                const formData = new FormData(document.getElementById('sample-form'));
                for(let [k,v] of formData) if(v) medData.secondary[k] = v;
            } else if(type === 'vitals') {
                const formData = new FormData(document.getElementById('vital-form'));
                for(let [k,v] of formData) if(v) medData.vitals[k] = v;
            }
            backToSelection();
        }

        function showMedicalSummary() {
            let html = '<div class="sheet-header"><h2 style="margin:0">Medical Log</h2></div><div class="sheet-section"><ul class="summary-list">';
            if(medData.passenger.seatNumber) html += `<li><strong>Passenger</strong>Seat ${medData.passenger.seatNumber}, Age ${medData.passenger.age || 'N/A'}</li>`;
            if(medData.primary.loc) html += `<li><strong>Primary Assessment</strong>LOC: ${medData.primary.loc}, Airway: ${medData.primary.airway}, Breathing: ${medData.primary.breathing}</li>`;
            if(Object.keys(medData.secondary).length) html += `<li><strong>Secondary (SAMPLE)</strong>${Object.entries(medData.secondary).map(([k,v]) => `${k}: ${v}`).join(', ')}</li>`;
            if(Object.keys(medData.vitals).length) html += `<li><strong>Vital Signs</strong>${Object.entries(medData.vitals).map(([k,v]) => `${k}: ${v}`).join(', ')}</li>`;
            html += '</ul></div>';
            
            document.getElementById('sheet-content').innerHTML = html;
            document.getElementById('modal-overlay').style.display = 'block';
            setTimeout(() => document.getElementById('modal-overlay').style.opacity = '1', 10);
            document.getElementById('recipe-sheet').classList.add('open');
        }

        function downloadNotes() {
            const textContent = JSON.stringify(medData, null, 2);
            const blob = new Blob([textContent], { type: "text/plain" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Medical_Log_${medData.passenger.seatNumber || 'Unknown'}.txt`;
            link.click();
        }

        function clearAllData() {
            if(confirm("Clear all assessment data?")) {
                medData = { passenger: {}, primary: {}, secondary: {}, vitals: {} };
                document.querySelectorAll('#medical-app form').forEach(f => f.reset());
                document.querySelectorAll('#medical-app .selected').forEach(b => b.classList.remove('selected'));
                backToSelection();
            }
        }

        // MIXOLOGY LOGIC
        let currentFilter = 'All';
        function setFilter(type, el) {
            currentFilter = type;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            filterRecipes();
        }

        function filterRecipes() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const grid = document.getElementById('recipe-grid');
            grid.innerHTML = '';

            const filtered = drinks.filter(d => {
                const matchesFilter = currentFilter === 'All' || d.type === currentFilter;
                const matchesSearch = d.name.toLowerCase().includes(query) || d.ingredients.join(' ').toLowerCase().includes(query);
                return matchesFilter && matchesSearch;
            });

            filtered.forEach((d, i) => {
                const card = document.createElement('div');
                card.className = 'recipe-card';
                card.style.animationDelay = `${i * 0.05}s`;
                card.onclick = () => openRecipe(d.id);
                card.innerHTML = `<div class="recipe-emoji">${d.emoji}</div><div class="recipe-name">${d.name}</div><div class="recipe-type">${d.type}</div>`;
                grid.appendChild(card);
            });
        }

        function openRecipe(id) {
            const d = drinks.find(x => x.id === id);
            if(!d) return;

            let html = `
                <div class="sheet-header">
                    <span class="emoji">${d.emoji}</span>
                    <h2>${d.name}</h2>
                    <div class="modal-tags">
                        <span class="modal-tag">🍷 ${d.glass}</span>
                        <span class="modal-tag">🧊 ${d.ice}</span>
                    </div>
                </div>
                <div class="sheet-section">
                    <div class="history-box">${d.history}</div>
                    <div class="section-label">Ingredients</div>
                    <ul class="method-list">${d.ingredients.map(i => `<li>${i}</li>`).join('')}</ul>
                    <div class="section-label" style="margin-top:25px">Method</div>
                    <p style="font-size:15px; line-height:1.6">${d.steps}</p>
                    <div class="section-label" style="margin-top:25px">Garnish</div>
                    <p style="font-size:15px; color:var(--text-light); font-weight:600">${d.garnish}</p>
                </div>
            `;
            
            document.getElementById('sheet-content').innerHTML = html;
            document.getElementById('modal-overlay').style.display = 'block';
            setTimeout(() => document.getElementById('modal-overlay').style.opacity = '1', 10);
            document.getElementById('recipe-sheet').classList.add('open');
        }

        function closeRecipe() {
            document.getElementById('modal-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('modal-overlay').style.display = 'none', 300);
            document.getElementById('recipe-sheet').classList.remove('open');
        }
        
        function closeSummary() { closeRecipe(); }

        // Init
        filterRecipes();
    </script>
</body>
</html>
